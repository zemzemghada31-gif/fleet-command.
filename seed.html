<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fleet Command — Firestore Seed</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0F172A; color: #E2E8F0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px; }
    .card { background: #1E293B; border-radius: 16px; padding: 40px; width: 100%; max-width: 680px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    p  { color: #94A3B8; font-size: 14px; margin-bottom: 28px; }
    button { width: 100%; padding: 14px; background: #2563EB; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
    button:disabled { background: #334155; cursor: not-allowed; }
    #log { margin-top: 28px; background: #0F172A; border-radius: 10px; padding: 20px; max-height: 480px; overflow-y: auto; font-family: monospace; font-size: 13px; line-height: 1.8; display: none; }
    .ok   { color: #4ADE80; }
    .err  { color: #F87171; }
    .info { color: #60A5FA; font-weight: bold; }
    .done { color: #FACC15; font-weight: bold; font-size: 15px; }
  </style>
</head>
<body>
<div class="card">
  <h1>🌱 Fleet Command — Firestore Seed</h1>
  <p>Creates all 10 collections with full mock data. Run once on a fresh database.</p>
  <div id="authSection">
    <input id="emailInput" type="email" placeholder="Admin email" style="width:100%;padding:12px;border-radius:8px;border:1px solid #334155;background:#0F172A;color:#E2E8F0;font-size:14px;margin-bottom:10px;" />
    <input id="passInput" type="password" placeholder="Password" style="width:100%;padding:12px;border-radius:8px;border:1px solid #334155;background:#0F172A;color:#E2E8F0;font-size:14px;margin-bottom:16px;" />
  </div>
  <button id="btn" onclick="runSeed()">Sign In &amp; Seed Database</button>
  <div id="log"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, collection, setDoc, addDoc, Timestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey:            "AIzaSyAceT8wKpyIL35XzehFkiaH9I9RMDfZ9FM",
  authDomain:        "fleet-command-b7128.firebaseapp.com",
  projectId:         "fleet-command-b7128",
  storageBucket:     "fleet-command-b7128.appspot.com",
  messagingSenderId: "623142089854",
  appId:             "1:623142089854:web:8ecd2fe7484985ee0f942f"
};

const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);

const logEl = document.getElementById("log");
const btn   = document.getElementById("btn");

function log(msg, cls = "ok") {
  logEl.style.display = "block";
  logEl.innerHTML += `<div class="${cls}">${msg}</div>`;
  logEl.scrollTop = logEl.scrollHeight;
}

// ── Analytics computation (mirrors Python backend exactly) ──────────────────
const BASE_STATS = {
  last_30_days: { distance: 284932,  fuel: 14.2, alerts: 24,  distTrend: "+12.4%", fuelTrend: "-2.1%"  },
  quarterly:    { distance: 892441,  fuel: 13.8, alerts: 61,  distTrend: "+8.7%",  fuelTrend: "-3.4%"  },
  yearly:       { distance: 3241002, fuel: 13.1, alerts: 187, distTrend: "+21.3%", fuelTrend: "-6.2%"  },
};
const REGION_MULT = { all: 1.0, north_america: 0.42, europe: 0.28, apac: 0.18, latam: 0.12 };
const BASE_TRENDS = {
  last_30_days: { active: [3,4,3.5,5,4.5,2,1.5],    maintenance: [1,1.5,1,2,1.5,1,0.5],   days: ["MON","TUE","WED","THU","FRI","SAT","SUN"] },
  quarterly:    { active: [12,15,11,18,16,9,7],       maintenance: [3,4.5,3,6,5,2.5,1.5],   days: ["W1","W2","W3","W4","W5","W6","W7"]         },
  yearly:       { active: [40,45,38,52,49,35,28],     maintenance: [8,10,7,14,12,6,4],       days: ["JAN","MAR","MAY","JUL","SEP","NOV","DEC"]  },
};

function computeStats(period, horizon, region) {
  const base = BASE_STATS[period];
  const mult = REGION_MULT[region] ?? 1.0;
  const distance = Math.round(base.distance * mult);
  const fuel     = region === "latam" ? base.fuel + 0.3 : base.fuel;
  const alerts   = Math.max(1, Math.round(base.alerts * mult));
  let distTrend  = base.distTrend;
  let fuelTrend  = base.fuelTrend;
  if (horizon === "predictive") {
    const rawDist = parseFloat(base.distTrend.replace("+", "").replace("%", ""));
    const rawFuel = parseFloat(base.fuelTrend.replace("%", ""));
    distTrend = `+${(rawDist * 1.2).toFixed(1)}% (forecast)`;
    fuelTrend = `${(rawFuel * 1.1).toFixed(1)}% (forecast)`;
  }
  return {
    period, horizon, region,
    totalDistance:  `${distance.toLocaleString()} km`,
    avgFuelEconomy: `${fuel.toFixed(1)} L/100km`,
    activeAlerts:   alerts,
    distanceTrend:  distTrend,
    fuelTrend:      fuelTrend,
  };
}

function computeTrends(period, region) {
  const base = BASE_TRENDS[period];
  const mult = REGION_MULT[region] ?? 1.0;
  return {
    period, region,
    active:      base.active.map(v => Math.round(v * mult * 100) / 100),
    maintenance: base.maintenance.map(v => Math.round(v * mult * 100) / 100),
    days:        base.days,
  };
}

window.runSeed = async function () {
  btn.disabled = true;
  btn.textContent = "Seeding…";
  logEl.innerHTML = "";

  const email    = document.getElementById("emailInput").value.trim();
  const password = document.getElementById("passInput").value;

  const PERIODS   = ["last_30_days", "quarterly", "yearly"];
  const HORIZONS  = ["historical", "realtime", "predictive"];
  const REGIONS   = ["all", "north_america", "europe", "apac", "latam"];

  try {
    // ── Sign in ────────────────────────────────────────────────────────────
    log("🔐 Signing in…", "info");
    await signInWithEmailAndPassword(auth, email, password);
    log("✅ Signed in — starting seed…", "ok");
    document.getElementById("authSection").style.display = "none";

    // ── 1. ANALYTICS STATS (3 periods × 3 horizons × 5 regions = 45 docs) ──
    log("── 1/10  analyticsStats (45 docs) ───────────────", "info");
    for (const period of PERIODS) {
      for (const horizon of HORIZONS) {
        for (const region of REGIONS) {
          const id   = `${period}_${horizon}_${region}`;
          const data = computeStats(period, horizon, region);
          await setDoc(doc(db, "analyticsStats", id), data);
        }
      }
      log(`  ✅ ${period} — all horizons & regions`);
    }

    // ── 2. ANALYTICS TRENDS (3 periods × 5 regions = 15 docs) ──────────────
    log("── 2/10  analyticsTrends (15 docs) ──────────────", "info");
    for (const period of PERIODS) {
      for (const region of REGIONS) {
        const id   = `${period}_${region}`;
        const data = computeTrends(period, region);
        await setDoc(doc(db, "analyticsTrends", id), data);
      }
      log(`  ✅ ${period} — all regions`);
    }

    // ── 3. VEHICLES ─────────────────────────────────────────────────────────
    log("── 3/10  vehicles ───────────────────────────────", "info");
    const vehicles = [
      { id: "BT-904-TX",  model: "Tesla Model X",    plate: "BT-904-TX",  year: "2022", status: "ACTIVE",      tracker: "X-9941-ALPHA", notes: "" },
      { id: "CA-123-VN",  model: "Mercedes Sprinter", plate: "CA-123-VN",  year: "2021", status: "MAINTENANCE", tracker: "Not Assigned", notes: "" },
      { id: "TX-4409-LP", model: "Ford Transit XL",   plate: "TX-4409-LP", year: "2023", status: "IDLE",        tracker: "X-9950-GAMMA", notes: "" },
    ];
    for (const v of vehicles) {
      const { id, ...data } = v;
      await setDoc(doc(db, "vehicles", id), { ...data, createdAt: Timestamp.now() });
      log(`  ✅ ${id}  (${data.status})`);
    }

    // ── 4. DEVICES ──────────────────────────────────────────────────────────
    log("── 4/10  devices ────────────────────────────────", "info");
    const devices = [
      { id: "X-9941-ALPHA", model: "Apex Tracker V3", assignment: "ASSIGNED",    lastConnection: "2 mins ago",       statusColor: "0xFF3B82F6", vehicleId: "BT-904-TX"  },
      { id: "X-8820-BETA",  model: "Core Link Hub",   assignment: "UNASSIGNED",  lastConnection: "14 hrs ago",       statusColor: "0xFF64748B", vehicleId: null          },
      { id: "X-1011-DELTA", model: "Apex Tracker V3", assignment: "MAINTENANCE", lastConnection: "Offline (3 days)", statusColor: "0xFFF59E0B", vehicleId: null          },
      { id: "X-9950-GAMMA", model: "Core Link Hub",   assignment: "ASSIGNED",    lastConnection: "Just now",         statusColor: "0xFF3B82F6", vehicleId: "TX-4409-LP" },
    ];
    for (const d of devices) {
      const { id, ...data } = d;
      await setDoc(doc(db, "devices", id), { ...data, createdAt: Timestamp.now() });
      log(`  ✅ ${id}  (${data.assignment})`);
    }

    // ── 5. MAINTENANCE TASKS ────────────────────────────────────────────────
    log("── 5/10  maintenanceTasks ───────────────────────", "info");
    const tasks = [
      { vehicleId: "CA-123-VN",  vehiclePlate: "CA-123-VN",  type: "Oil Change",        status: "PENDING",     dueDate: "Oct 18, 2026", technician: "J. Torres"  },
      { vehicleId: "TX-4409-LP", vehiclePlate: "TX-4409-LP", type: "Tire Rotation",     status: "IN PROGRESS", dueDate: "Oct 15, 2026", technician: "A. Smith"   },
      { vehicleId: "BT-904-TX",  vehiclePlate: "BT-904-TX",  type: "Brake Inspection",  status: "COMPLETED",   dueDate: "Oct 10, 2026", technician: "M. Johnson" },
      { vehicleId: "CA-123-VN",  vehiclePlate: "CA-123-VN",  type: "Coolant Flush",     status: "PENDING",     dueDate: "Oct 20, 2026", technician: "J. Torres"  },
      { vehicleId: "TX-4409-LP", vehiclePlate: "TX-4409-LP", type: "Engine Diagnostic", status: "OVERDUE",     dueDate: "Oct 05, 2026", technician: "A. Smith"   },
    ];
    for (const t of tasks) {
      const ref = await addDoc(collection(db, "maintenanceTasks"), { ...t, createdAt: Timestamp.now() });
      log(`  ✅ ${ref.id}  (${t.type} — ${t.status})`);
    }

    // ── 6. MAINTENANCE LOGS ─────────────────────────────────────────────────
    log("── 6/10  maintenanceLogs ────────────────────────", "info");
    const logs = [
      { vehicleId: "BT-904-TX",  title: "Brake pad replacement", type: "Repair",  notes: "Replaced front brake pads.",          date: "2026-04-01", fileName: "", fileUrl: "" },
      { vehicleId: "CA-123-VN",  title: "Oil change",            type: "Routine", notes: "5W-30 synthetic oil, filter changed.", date: "2026-03-15", fileName: "", fileUrl: "" },
      { vehicleId: "TX-4409-LP", title: "Tire rotation",         type: "Routine", notes: "All four tires rotated.",              date: "2026-03-20", fileName: "", fileUrl: "" },
    ];
    for (const l of logs) {
      const ref = await addDoc(collection(db, "maintenanceLogs"), { ...l, createdAt: Timestamp.now() });
      log(`  ✅ ${ref.id}  (${l.title})`);
    }

    // ── 7. DTC CODES ────────────────────────────────────────────────────────
    log("── 7/10  dtcCodes ───────────────────────────────", "info");
    const dtcCodes = [
      { vehicleId: "BT-904-TX",  code: "P0301", description: "Cylinder 1 misfire detected",                          severity: "HIGH",     isActive: true,  detectedAt: Timestamp.now() },
      { vehicleId: "BT-904-TX",  code: "P0420", description: "Catalyst system efficiency below threshold",            severity: "MEDIUM",   isActive: true,  detectedAt: Timestamp.now() },
      { vehicleId: "CA-123-VN",  code: "P0171", description: "System too lean (Bank 1)",                             severity: "HIGH",     isActive: true,  detectedAt: Timestamp.now() },
      { vehicleId: "TX-4409-LP", code: "C0035", description: "Left front wheel speed sensor fault",                  severity: "CRITICAL", isActive: true,  detectedAt: Timestamp.now() },
      { vehicleId: "TX-4409-LP", code: "P0128", description: "Coolant temperature below thermostat regulating temp", severity: "LOW",      isActive: false, detectedAt: Timestamp.now() },
    ];
    for (const d of dtcCodes) {
      const ref = await addDoc(collection(db, "dtcCodes"), d);
      log(`  ✅ ${ref.id}  (${d.code} — ${d.severity})`);
    }

    // ── 8. ALERTS ───────────────────────────────────────────────────────────
    log("── 8/10  alerts ─────────────────────────────────", "info");
    const alerts = [
      { vehicleId: "BT-904-TX",  type: "SPEEDING",    message: "Speed exceeded 65 MPH on I-880",    severity: "HIGH",   isScheduled: false, mechanic: "",         scheduledDate: "", createdAt: Timestamp.now() },
      { vehicleId: "BT-904-TX",  type: "LONG STOP",   message: "Unscheduled stop detected (45 min)", severity: "MEDIUM", isScheduled: true,  mechanic: "A. Smith", scheduledDate: "Oct 18, 2026", createdAt: Timestamp.now() },
      { vehicleId: "CA-123-VN",  type: "MAINTENANCE", message: "Vehicle entered maintenance route",  severity: "LOW",    isScheduled: false, mechanic: "",         scheduledDate: "", createdAt: Timestamp.now() },
      { vehicleId: "TX-4409-LP", type: "GEOFENCE",    message: "Vehicle left authorized zone",       severity: "HIGH",   isScheduled: false, mechanic: "",         scheduledDate: "", createdAt: Timestamp.now() },
    ];
    for (const a of alerts) {
      const ref = await addDoc(collection(db, "alerts"), a);
      log(`  ✅ ${ref.id}  (${a.type})`);
    }

    // ── 9. TRAJECTORY POINTS ────────────────────────────────────────────────
    log("── 9/10  trajectoryPoints (subcollections) ──────", "info");
    const trajectories = {
      "BT-904-TX": [
        { lat: 37.8044, lng: -122.2712, speed: 55 }, // Oakland
        { lat: 37.7749, lng: -122.4194, speed: 62 }, // San Francisco
        { lat: 37.5485, lng: -121.9886, speed: 70 }, // Fremont
        { lat: 37.3382, lng: -121.8863, speed: 48 }, // San Jose
      ],
      "CA-123-VN": [
        { lat: 37.3382, lng: -121.8863, speed: 40 }, // San Jose
        { lat: 37.4419, lng: -122.1430, speed: 35 }, // Palo Alto
      ],
      "TX-4409-LP": [
        { lat: 37.6213, lng: -122.3790, speed: 60 }, // SFO
        { lat: 37.7749, lng: -122.4194, speed: 45 }, // Downtown SF
        { lat: 37.8716, lng: -122.2727, speed: 58 }, // Berkeley
      ],
    };
    for (const [vehicleId, points] of Object.entries(trajectories)) {
      for (const p of points) {
        await addDoc(collection(db, "trajectoryPoints", vehicleId, "points"), { ...p, recordedAt: Timestamp.now() });
      }
      log(`  ✅ ${vehicleId}  (${points.length} GPS points)`);
    }

    // ── 10. USERS ───────────────────────────────────────────────────────────
    log("── 10/10 users ──────────────────────────────────", "info");
    await setDoc(doc(db, "users", "admin"), {
      email: "admin@fleet.io",
      displayName: "Admin User",
      role: "admin",
      createdAt: Timestamp.now(),
    });
    log("  ✅ admin@fleet.io  (role: admin)");

    log("", "ok");
    log("🎉  All 10 collections seeded successfully!", "done");
    log("   Open Firestore Console to verify →  console.firebase.google.com", "done");
    btn.textContent = "✅ Seeding Complete";

  } catch (err) {
    log(`❌ ERROR: ${err.message}`, "err");
    console.error(err);
    btn.disabled = false;
    btn.textContent = "Sign In & Seed Database";
    document.getElementById("authSection").style.display = "block";
  }
};
</script>
</body>
</html>
